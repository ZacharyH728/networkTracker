services:
  network-tracker:
    build: .
    restart: unless-stopped
    network_mode: host       # required — ARP scans need access to the real LAN interface
    cap_add:
      - NET_RAW              # raw socket access for Scapy ARP packets
      - NET_ADMIN            # needed to interact with ARP table
    env_file: .env
    volumes:
      - ./data:/app/data     # persist SQLite database outside the container
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Etc/UTC

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    volumes:
      - ./data:/app/data     # shared read/write access to the same SQLite DB
    environment:
      - DB_PATH=/app/data/tracker.db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "8021:80"
